{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load static %}

{% block title %}Edit Equipment{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/collection.css' %}">
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Edit Equipment</h2>
                    <form method="post" enctype="multipart/form-data" id="equipmentForm">
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <div class="mb-3">
                            <label for="images" class="form-label">Images</label>
                            <input type="file" class="form-control" id="images" name="images" multiple accept="image/*">
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">Save Changes</button>
                            <a href="{% url 'item_detail' item_id=item.id %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
