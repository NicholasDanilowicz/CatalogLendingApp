{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load static %}

{% block title %}Create Collection{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/collection.css' %}">
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Create New Collection</h2>
                    <form method="post" id="collectionForm">
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">Create Collection</button>
                            <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ***************************************************************************************
*  REFERENCES
*  Title: Creating a JavaScript script to toggle the allowed users field visibility
*  Author: OpenAI (ChatGPT)
*  Date: 2025
*  Code version: GPT-4o
*  URL: https://chat.openai.com/
*  Software License: OpenAI Terms of Use
*  Description: Used ChatGPT to help create a JavaScript script that dynamically toggles the visibility of the allowed users field.
*************************************************************************************** -->

<script>
document.addEventListener('DOMContentLoaded', function() {
    const isPrivateCheckbox = document.querySelector('input[name="is_public"]');
    const allowedUsersField = document.querySelector('.allowed-users-field');

    function toggleAllowedUsers() {
        if (!isPrivateCheckbox.checked) {
            allowedUsersField.style.display = 'none';
            const userCheckboxes = allowedUsersField.querySelectorAll('input[type="checkbox"]');
            userCheckboxes.forEach(checkbox => checkbox.checked = false);
        } else {
            allowedUsersField.style.display = 'block';
        }
    }

    if (isPrivateCheckbox) {
        isPrivateCheckbox.addEventListener('change', toggleAllowedUsers);
        toggleAllowedUsers();
    }
});
</script>
{% endblock %}
