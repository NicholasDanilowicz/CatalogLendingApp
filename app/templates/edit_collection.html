{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load static %}

{% block title %}Edit Collection{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/collection.css' %}">
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Edit Collection</h2>
                    <form method="post" id="collectionForm">
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">Save Changes</button>
                            <a href="{% url 'collection_detail' collection_id=collection.id %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const visibilityRadios = document.querySelectorAll('input[name="visibility"]');
    const allowedUsersField = document.querySelector('.allowed-users-field');

    function toggleAllowedUsers() {
        const isPrivate = document.querySelector('input[name="visibility"]:checked').value === 'private';
        if (isPrivate) {
            allowedUsersField.style.display = 'block';
        } else {
            allowedUsersField.style.display = 'none';
            const userCheckboxes = allowedUsersField.querySelectorAll('input[type="checkbox"]');
            userCheckboxes.forEach(checkbox => checkbox.checked = false);
        }
    }

    if (visibilityRadios.length > 0) {
        visibilityRadios.forEach(radio => {
            radio.addEventListener('change', toggleAllowedUsers);
        });
        toggleAllowedUsers();
    }
});
</script>
{% endblock %}
