{% extends 'base.html' %}
{% load static %}
{% load django_bootstrap5 %}

{% block title %}
{{ item.name }}
{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/item_detail.css' %}">
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4">Put Item in Your Public Collections</h2>
                    <form method="post">
                        {% csrf_token %}
                        {% bootstrap_form form %}
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">Put Item in Collection(s)</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
