{% load django_bootstrap5 %}
{% load static %}

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Librarian Home</title>
  {% bootstrap_css %}
</head>
<body style="background-color: #2E3440;">

  <!-- Main Content -->
  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <h2 class="mb-4 text-center" style="color: #5E81AC;">Welcome to Librarian Page</h2>
        <p style="color: #ECEFF4;">Hello, {{ user.email }}!</p>
        <p style="color: #ECEFF4;">Role: Librarian</p>
        <div class="text-center">
          <a href="{% url 'logout' %}" class="btn" style="background-color: #81A1C1; border-color: #81A1C1; color: #ECEFF4;">Logout</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center py-3 fixed-bottom" style="background-color: #3B4252; color: #ECEFF4;">
    <div class="container">
      <small>© 2025 A-19. All rights reserved.</small>
    </div>
  </footer>
